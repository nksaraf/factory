server {
    listen 8005;
    server_name localhost;

    client_max_body_size 100M;

    # --- CORS (temporary permissive, supports credentials) ---
    # These headers will be sent on all responses from this server.
    # Using $http_origin makes it effectively permissive for any requesting origin
    # while still allowing credentials (cookies, Authorization headers).
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-CSRF-Token, Accept, Origin, Referer, User-Agent, Access-Control-Request-Method, Access-Control-Request-Headers" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Type, X-Requested-With" always;

    # Handle CORS preflight requests for all locations.
    # Note: Nginx in this context does not allow add_header inside this if block,
    # but the global add_header directives above (with 'always') will still apply.
    if ($request_method = OPTIONS) {
        return 204;
    }

    # --- Better Auth (auth-service) ---
    location /api/auth {
        otel_span_name "$request_method /api/auth";
        proxy_pass http://auth-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
        proxy_pass_request_headers on;
    }

    # --- Data Service ---
    location /api/data {
        otel_span_name "$request_method /api/data";
        proxy_pass http://data-service/api/data;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Data Query Service ---
    location /api/query {
        otel_span_name "$request_method /api/query";
        proxy_pass http://data-query-service/api/query;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

