log_format gateway '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time urt=$upstream_response_time '
                  'ustatus=$upstream_status upstream=$upstream_addr';

access_log /var/log/nginx/access.log gateway;

upstream auth-service {
    server infra-auth:3000;
}

upstream data-service {
    server service-data:8084;
}

upstream data-query-service {
    server service-data-query:8087;
}

