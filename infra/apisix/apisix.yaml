#
# APISIX Declarative Routes — generated from catalog.yaml
# Re-generate with: dx catalog gateway
#

upstreams:
- id: auth-service
  nodes:
    infra-auth:3000: 1
- id: ai-service
  nodes:
    service-ai:8085: 1
- id: data-service
  nodes:
    service-data:8084: 1
- id: data-query-service
  nodes:
    service-data-query:8087: 1
- id: graph-service
  nodes:
    service-graph:8086: 1
- id: ml-engine-service
  nodes:
    service-ml-engine:8091: 1
- id: api-docs
  nodes:
    infra-api-docs:80: 1
global_rules:
- id: 1
  plugins:
    real-ip:
      source: http_x_forwarded_for
routes:
# Auth route — no CORS plugin; infra-auth handles its own CORS headers
- id: auth
  uri: /api/v1/auth*
  upstream_id: auth-service
  plugins:
    opentelemetry:
      sampler:
        name: always_on
    proxy-rewrite:
      headers:
        set:
          X-Real-IP: $remote_addr
          X-Forwarded-For: $remote_addr
          X-Forwarded-Proto: $scheme
- id: ai
  uri: /api/v1/ai*
  upstream_id: ai-service
  plugins:
    cors:
      allow_origins: '**'
      allow_methods: GET, POST, PUT, PATCH, DELETE, OPTIONS
      allow_headers: Authorization, Content-Type, X-Requested-With, X-CSRF-Token,
        Accept, Origin, Referer, User-Agent, Access-Control-Request-Method, Access-Control-Request-Headers
      expose_headers: Content-Length, Content-Type, X-Requested-With
      allow_credential: true
      max_age: 3600
    opentelemetry:
      sampler:
        name: always_on
    proxy-rewrite:
      regex_uri:
      - ^/api/v1/ai(.*)
      - /api/v1/ai$1
      headers:
        set:
          X-Real-IP: $remote_addr
          X-Forwarded-For: $remote_addr
- id: data
  uri: /api/v1/data*
  upstream_id: data-service
  plugins:
    cors:
      allow_origins: '**'
      allow_methods: GET, POST, PUT, PATCH, DELETE, OPTIONS
      allow_headers: Authorization, Content-Type, X-Requested-With, X-CSRF-Token,
        Accept, Origin, Referer, User-Agent, Access-Control-Request-Method, Access-Control-Request-Headers
      expose_headers: Content-Length, Content-Type, X-Requested-With
      allow_credential: true
      max_age: 3600
    opentelemetry:
      sampler:
        name: always_on
    proxy-rewrite:
      regex_uri:
      - ^/api/v1/data(.*)
      - /api/v1/data$1
      headers:
        set:
          X-Real-IP: $remote_addr
          X-Forwarded-For: $remote_addr
- id: data-query
  uri: /api/v1/query*
  upstream_id: data-query-service
  plugins:
    cors:
      allow_origins: '**'
      allow_methods: GET, POST, PUT, PATCH, DELETE, OPTIONS
      allow_headers: Authorization, Content-Type, X-Requested-With, X-CSRF-Token,
        Accept, Origin, Referer, User-Agent, Access-Control-Request-Method, Access-Control-Request-Headers
      expose_headers: Content-Length, Content-Type, X-Requested-With
      allow_credential: true
      max_age: 3600
    opentelemetry:
      sampler:
        name: always_on
    proxy-rewrite:
      regex_uri:
      - ^/api/v1/query(.*)
      - /api/v1/query$1
      headers:
        set:
          X-Real-IP: $remote_addr
          X-Forwarded-For: $remote_addr
  timeout:
    connect: 10
    read: 300
    send: 300
- id: graph
  uri: /api/v1/graph*
  upstream_id: graph-service
  plugins:
    cors:
      allow_origins: '**'
      allow_methods: GET, POST, PUT, PATCH, DELETE, OPTIONS
      allow_headers: Authorization, Content-Type, X-Requested-With, X-CSRF-Token,
        Accept, Origin, Referer, User-Agent, Access-Control-Request-Method, Access-Control-Request-Headers
      expose_headers: Content-Length, Content-Type, X-Requested-With
      allow_credential: true
      max_age: 3600
    opentelemetry:
      sampler:
        name: always_on
    proxy-rewrite:
      regex_uri:
      - ^/api/v1/graph(.*)
      - /api/v1/graph$1
      headers:
        set:
          X-Real-IP: $remote_addr
          X-Forwarded-For: $remote_addr
- id: ml-engine
  uri: /api/v1/ml*
  upstream_id: ml-engine-service
  plugins:
    cors:
      allow_origins: '**'
      allow_methods: GET, POST, PUT, PATCH, DELETE, OPTIONS
      allow_headers: Authorization, Content-Type, X-Requested-With, X-CSRF-Token,
        Accept, Origin, Referer, User-Agent, Access-Control-Request-Method, Access-Control-Request-Headers
      expose_headers: Content-Length, Content-Type, X-Requested-With
      allow_credential: true
      max_age: 3600
    opentelemetry:
      sampler:
        name: always_on
    proxy-rewrite:
      regex_uri:
      - ^/api/v1/ml(.*)
      - /api/v1/ml$1
      headers:
        set:
          X-Real-IP: $remote_addr
          X-Forwarded-For: $remote_addr
- id: docs-portal
  uri: /docs
  upstream_id: api-docs
  plugins:
    proxy-rewrite:
      uri: /
- id: health
  uri: /health
  plugins:
    response-rewrite:
      status_code: 200
      body: '{"status":"healthy"}'
      headers:
        set:
          Content-Type: application/json

#END
