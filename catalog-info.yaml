# catalog-info.yaml — Backstage Software Catalog descriptor
#
# Self-sufficient: contains all runtime information needed to generate:
#   - docker-compose.yaml (dev)   — images, ports, env, volumes, healthchecks, build
#   - Helm chart (staging/prod)   — healthchecks, compute, routes, secrets, persistent volumes, replicas
#   - dx.yaml (dx dev)            — components, resources, connections, dev commands

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: factory
  namespace: default
  title: Factory
  description: >-
    Factory platform — product management, build pipelines, fleet orchestration,
    agent runtime, and developer experience tooling.
  tags:
    - platform
    - internal
  links:
    - url: https://docs.internal/factory
      title: Documentation
      type: doc
    - url: /api/v1/factory/openapi
      title: OpenAPI Spec
      type: api-doc
spec:
  owner: team:default/platform
  domain: conductor

---
# ─── Components (services we build) ───────────────────────────

apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: factory-api
  namespace: default
  title: Factory API
  description: >-
    Elysia-based REST API for product, build, fleet, agent, commerce,
    and infrastructure management. Serves the /api/v1/factory namespace.
  tags:
    - api
    - rest
    - elysia
    - typescript
  annotations:
    backstage.io/techdocs-ref: dir:.
  links:
    - url: /api/v1/factory/openapi
      title: OpenAPI Spec
      type: api-doc
    - url: https://docs.internal/factory
      title: Documentation
      type: doc
spec:
  type: service
  lifecycle: production
  owner: team:default/platform
  system: system:default/factory
  providesApis:
    - factory-api
  consumesApis:
    - auth-api
  dependsOn:
    - resource:default/factory-postgres
    - resource:default/factory-auth

  # ── Container runtime ──
  image: asia-south2-docker.pkg.dev/rio-platform/docker/factory-service:latest
  build:
    context: ./
    dockerfile: ./api/Dockerfile
    args:
      GOOGLE_APPLICATION_CREDENTIALS_BASE64: ${GCP_NPM_SA_JSON_BASE64}
  ports:
    - name: http
      port: 8181
      containerPort: 3000
      protocol: http
  environment:
    FACTORY_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@factory-postgres:5432/${POSTGRES_DB:-postgres}
    FACTORY_AUTH_JWKS_URL: http://factory-auth:3000/api/v1/auth/.well-known/jwks.json
    FACTORY_LOG_LEVEL: info
    FACTORY_LOG_FORMAT: json
  secrets:
    - envVar: GCP_NPM_SA_JSON_BASE64
      ref: projects/rio-platform/secrets/gcp-npm-sa-json-base64/versions/latest
      localDefault: ""
  volumes:
    - hostPath: ./infra/factory/application.yml
      containerPath: /app/config/application.yml
      readOnly: true

  # ── Healthchecks ──
  healthchecks:
    live:
      http: { path: /api/v1/health, port: 3000 }
      delay: 10
      interval: 15
      timeout: 5
      retries: 3
    ready:
      http: { path: /api/v1/factory/openapi, port: 3000 }
      delay: 5
      interval: 10
      timeout: 5
      retries: 3
    start:
      http: { path: /api/v1/health, port: 3000 }
      interval: 5
      timeout: 3
      retries: 12

  # ── Scaling / compute ──
  replicas: 2
  compute:
    min: { cpu: 250m, memory: 512Mi }
    max: { cpu: "1", memory: 1Gi }

  # ── Networking ──
  routes:
    - host: factory.internal
      path: /api/v1/factory
      pathMatch: prefix
      portName: http
      tls:
        enabled: true
        secretName: factory-tls
      labels:
        nginx.ingress.kubernetes.io/rewrite-target: /api/v1/factory
      provider: nginx
  isPublic: false

  # ── Dev workflow ──
  dev:
    command: pnpm --filter @smp/factory-api dev
    sync:
      - ./api/src
      - ./shared/src
  test: pnpm --filter @smp/factory-api test
  lint: pnpm --filter @smp/factory-api lint
  runtime: node

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: factory-cli
  namespace: default
  title: Factory CLI (dx)
  description: >-
    Developer CLI for local development, deployment, git workflows,
    infrastructure management, and module operations. Published as `lepton-dx`.
  tags:
    - cli
    - developer-tools
    - typescript
spec:
  type: worker
  lifecycle: production
  owner: team:default/platform
  system: system:default/factory
  consumesApis:
    - factory-api
    - auth-api
  dev:
    command: pnpm --filter lepton-dx dev
  test: pnpm --filter lepton-dx test
  lint: pnpm --filter lepton-dx lint
  runtime: node

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: factory-shared
  namespace: default
  title: Factory Shared Library
  description: >-
    Shared TypeScript types, Zod schemas, catalog format adapters,
    compose generation, and environment resolution used by both API and CLI.
  tags:
    - library
    - typescript
    - shared
spec:
  type: library
  lifecycle: production
  owner: team:default/platform
  system: system:default/factory
  runtime: node

---
# ─── Resources (infrastructure dependencies) ──────────────────

apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: factory-postgres
  namespace: default
  title: PostgreSQL
  description: Shared PostgreSQL 16 database for factory and auth schemas.
  tags:
    - database
    - postgresql
spec:
  type: database
  lifecycle: production
  owner: team:default/platform
  system: system:default/factory
  dependencyOf:
    - component:default/factory-api
    - resource:default/factory-auth

  # ── Container runtime ──
  image: postgres:16-alpine
  ports:
    - name: postgres
      port: 5432
      protocol: tcp
  environment:
    POSTGRES_USER: ${POSTGRES_USER:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB:-postgres}
  secrets:
    - envVar: POSTGRES_PASSWORD
      ref: projects/rio-platform/secrets/factory-postgres-password/versions/latest
      localDefault: postgres
  volumes:
    - name: postgres-data
      containerPath: /var/lib/postgresql/data
      persistent:
        size: 10Gi
        class: standard
        mode: read-write-once

  # ── Healthchecks ──
  healthcheck: pg_isready -U postgres -d postgres
  healthchecks:
    live:
      command: ["pg_isready", "-U", "postgres", "-d", "postgres"]
      delay: 15
      interval: 10
      timeout: 5
      retries: 3
    ready:
      command: ["pg_isready", "-U", "postgres", "-d", "postgres"]
      delay: 5
      interval: 5
      timeout: 3
      retries: 3

  # ── Scaling / compute ──
  stateful: true
  replicas: 1
  compute:
    min: { cpu: 250m, memory: 256Mi }
    max: { cpu: "1", memory: 1Gi }

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: factory-auth
  namespace: default
  title: Better Auth Service
  description: >-
    Authentication provider — email/password, OAuth (GitHub, Google),
    email OTP, organizations, JWT, bearer tokens, API keys.
  tags:
    - auth
    - oauth
    - jwt
    - better-auth
  links:
    - url: https://www.better-auth.com/docs
      title: Better Auth Docs
      type: doc
    - url: /api/v1/auth/reference
      title: Auth API Reference
      type: api-doc
spec:
  type: auth-provider
  lifecycle: production
  owner: team:default/platform
  system: system:default/factory
  dependsOn:
    - resource:default/factory-postgres

  # ── Container runtime ──
  image: asia-south2-docker.pkg.dev/rio-platform/docker/auth-service:latest
  ports:
    - name: http
      port: 8180
      containerPort: 3000
      protocol: http
  environment:
    AUTH_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@factory-postgres:5432/${POSTGRES_DB:-postgres}
    AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:${INFRA_REVERSE_PROXY_PORT:-9000}}
  secrets:
    - envVar: AUTH_GITHUB_CLIENT_ID
      ref: projects/rio-platform/secrets/auth-github-client-id/versions/latest
    - envVar: AUTH_GITHUB_CLIENT_SECRET
      ref: projects/rio-platform/secrets/auth-github-client-secret/versions/latest
    - envVar: AUTH_GOOGLE_CLIENT_ID
      ref: projects/rio-platform/secrets/auth-google-client-id/versions/latest
    - envVar: AUTH_GOOGLE_CLIENT_SECRET
      ref: projects/rio-platform/secrets/auth-google-client-secret/versions/latest
  volumes:
    - hostPath: ./infra/auth/auth.settings.yaml
      containerPath: /app/config/application.yml
      readOnly: true

  # ── Healthchecks ──
  healthcheck: "node -e \"fetch('http://localhost:3000/api/v1/auth/reference').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""
  healthchecks:
    live:
      http: { path: /api/v1/auth/reference, port: 3000 }
      delay: 10
      interval: 15
      timeout: 5
      retries: 3
    ready:
      http: { path: /api/v1/auth/reference, port: 3000 }
      delay: 5
      interval: 10
      timeout: 5
      retries: 3
    start:
      http: { path: /api/v1/auth/reference, port: 3000 }
      interval: 5
      timeout: 3
      retries: 12

  # ── Scaling / compute ──
  replicas: 1
  compute:
    min: { cpu: 100m, memory: 256Mi }
    max: { cpu: 500m, memory: 512Mi }

  # ── Networking ──
  routes:
    - host: factory.internal
      path: /api/v1/auth
      pathMatch: prefix
      portName: http
      tls:
        enabled: true
        secretName: factory-tls
      provider: nginx

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: factory-gateway
  namespace: default
  title: APISIX API Gateway
  description: >-
    Apache APISIX gateway — handles auth forwarding, CORS, OpenTelemetry
    tracing, and declarative route configuration.
  tags:
    - gateway
    - apisix
    - routing
spec:
  type: gateway
  lifecycle: production
  owner: team:default/platform
  system: system:default/factory

  # ── Container runtime ──
  image: apache/apisix:3.11.0-debian
  ports:
    - name: http
      port: 8005
      protocol: http
    - name: admin
      port: 9180
      protocol: http
  environment:
    CLICKSTACK_API_KEY: ${CLICKSTACK_API_KEY}
  secrets:
    - envVar: CLICKSTACK_API_KEY
      ref: projects/rio-platform/secrets/clickstack-api-key/versions/latest
      localDefault: ""
  volumes:
    - hostPath: ./infra/apisix/config.yaml
      containerPath: /usr/local/apisix/conf/config.yaml
      readOnly: true
    - hostPath: ./infra/apisix/apisix.yaml
      containerPath: /usr/local/apisix/conf/apisix.yaml
      readOnly: true

  # ── Healthchecks ──
  healthcheck: "curl -sf http://localhost:8005/health || exit 1"
  healthchecks:
    live:
      http: { path: /health, port: 8005 }
      delay: 10
      interval: 10
      timeout: 5
      retries: 3
    ready:
      http: { path: /health, port: 8005 }
      delay: 5
      interval: 5
      timeout: 3
      retries: 3
    start:
      http: { path: /health, port: 8005 }
      interval: 3
      timeout: 3
      retries: 10

  # ── Scaling / compute ──
  replicas: 1
  compute:
    min: { cpu: 100m, memory: 128Mi }
    max: { cpu: 500m, memory: 256Mi }

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: factory-reverse-proxy
  namespace: default
  title: Traefik Reverse Proxy
  description: >-
    Traefik v3 reverse proxy — routes frontend and API traffic,
    OTLP tracing, dynamic config via file provider.
  tags:
    - traefik
    - proxy
    - routing
spec:
  type: gateway
  lifecycle: production
  owner: team:default/platform
  system: system:default/factory

  # ── Container runtime ──
  image: traefik:v3.6.8
  command:
    - --providers.file.filename=/etc/traefik/dynamic/dynamic.yml
    - --providers.file.watch=true
    - --entrypoints.web.address=:80
    - --api.dashboard=false
    - --api.insecure=false
    - --ping=true
    - --ping.entrypoint=web
    - --log.level=INFO
    - --accesslog=true
    - --tracing=true
    - --tracing.otlp=true
    - --tracing.otlp.http=true
    - --tracing.otlp.http.endpoint=http://infra-clickstack-otel:4318/v1/traces
    - --tracing.serviceName=infra-reverse-proxy
  ports:
    - name: http
      port: 3001
      containerPort: 80
      protocol: http
  volumes:
    - hostPath: ./infra/traefik/dynamic.yml
      containerPath: /etc/traefik/dynamic/dynamic.yml
      readOnly: true

  # ── Healthchecks ──
  healthchecks:
    live:
      http: { path: /ping, port: 80 }
      delay: 5
      interval: 10
      timeout: 3
      retries: 3
    ready:
      http: { path: /ping, port: 80 }
      delay: 3
      interval: 5
      timeout: 3
      retries: 3

  # ── Scaling / compute ──
  replicas: 1
  compute:
    min: { cpu: 50m, memory: 64Mi }
    max: { cpu: 200m, memory: 128Mi }

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: factory-api-docs
  namespace: default
  title: API Documentation
  description: Scalar UI for API documentation, served via nginx.
  tags:
    - docs
    - nginx
    - scalar
spec:
  type: other
  lifecycle: production
  owner: team:default/platform
  system: system:default/factory
  dependsOn:
    - resource:default/factory-gateway
    - resource:default/factory-reverse-proxy

  # ── Container runtime ──
  image: nginx:alpine
  ports:
    - name: http
      port: 80
      protocol: http
  volumes:
    - hostPath: ./infra/nginx/api-docs.html
      containerPath: /usr/share/nginx/html/index.html
      readOnly: true

  # ── Healthchecks ──
  healthchecks:
    live:
      http: { path: /, port: 80 }
      interval: 30
      timeout: 3
      retries: 3
    ready:
      http: { path: /, port: 80 }
      interval: 10
      timeout: 3
      retries: 3

  # ── Scaling / compute ──
  replicas: 1
  compute:
    min: { cpu: 10m, memory: 16Mi }
    max: { cpu: 50m, memory: 32Mi }

---
# ─── APIs ──────────────────────────────────────────────────────

apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: factory-api
  namespace: default
  title: Factory API
  description: >-
    REST API for product management, build pipelines, fleet orchestration,
    agent runtime, commerce, and infrastructure operations.
  tags:
    - openapi
    - rest
spec:
  type: openapi
  lifecycle: production
  owner: team:default/platform
  system: system:default/factory
  definition: |
    $text: /api/v1/factory/openapi

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: auth-api
  namespace: default
  title: Auth API
  description: >-
    Better Auth REST API — authentication, session management,
    organization membership, OAuth flows, API key management.
  tags:
    - openapi
    - rest
    - auth
spec:
  type: openapi
  lifecycle: production
  owner: team:default/platform
  system: system:default/factory
  definition: |
    $text: /api/v1/auth/reference
