# Factory API — loaded by @rio.js/app-config (resolveConfig).
# Precedence: schema defaults < this file < application-{APP_PROFILE}.yml < config/.env < process.env
# Env keys: FACTORY_DATABASE_URL, FACTORY_AUTH_JWKS_URL, FACTORY_LOG_LEVEL, FACTORY_LOG_FORMAT

factory:
  database:
    # Fall back to DATABASE_URL when unset (interpolation)
    url: "${DATABASE_URL:postgres://postgres:postgres@localhost:54333/postgres}"
  auth:
    jwksUrl: "${FACTORY_AUTH_JWKS_URL:http://localhost:8180/api/v1/auth/.well-known/jwks.json}"
  log:
    level: info
    format: json
