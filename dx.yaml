# Software Factory — local `dxi dev` layout
# Run from this directory: `./dxi dev` or `pnpm run dxi -- dev`
#
# `api` image is built via `factory/api/Dockerfile` with repo-root context. Omit `image:` on
# the api component — if set, compose-gen skips Docker build and only runs that image.
# `ui` stays an nginx static stub. For native hot reload: `cd api && pnpm dev` (port 4100)
# with Postgres from this stack.

module: factory
team: local

components:
  api:
    path: ./api
    port: 14100
    container_port: 3000
    healthcheck: /health
    # Repo root: lockfile + workspace packages (@rio.js/app-config, @smp/factory-shared)
    build:
      context: ../..
      dockerfile: factory/api/Dockerfile
  ui:
    path: .dx/serve/ui
    port: 13100
    container_port: 80
    healthcheck: /
    image: nginx:alpine
    dev:
      sync:
        - ./:/usr/share/nginx/html:ro

dependencies:
  postgres:
    image: postgres:16-alpine
    port: 5433
    container_port: 5432
    env:
      POSTGRES_DB: factory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck: pg_isready -U postgres -d factory

connections: {}
