# docker-compose.yaml
#
# Canonical project definition — docker-compose is the single source of truth.
# Uses dx.* labels for service metadata (type, owner, ports, APIs, docs).

x-dx:
  name: factory-core
  owner: platform
  description: "Factory DX — developer experience platform and CLI toolchain"
  lifecycle: production
  repo: https://github.com/nksaraf/factory
  tags: "dx,cli,platform,backstage"
  dependencies: []

services:
  # ─── Components (things we build) ────────────────────────────

  infra-factory:
    image: "${DOCKER_REGISTRY_GCP:-asia-south2-docker.pkg.dev}/rio-platform/docker/factory-service:latest"
    platform: linux/amd64
    build:
      context: ./
      dockerfile: ./api-server/Dockerfile
      args:
        GOOGLE_APPLICATION_CREDENTIALS_BASE64: ${GCP_NPM_SA_JSON_BASE64}
    dns: [127.0.0.11]
    restart: unless-stopped
    ports:
      - "${INFRA_FACTORY_PORT:-4100}:4100"
      - "${INFRA_GATEWAY_PROXY_PORT:-9090}:9090"
    depends_on:
      infra-postgres:
        condition: service_healthy
      infra-auth:
        condition: service_healthy
    volumes:
      - ./infra/factory/application.yml:/app/config/application.yml:ro
      - factory-documents:/data/documents
    environment:
      PORT: 4100
      FACTORY_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@infra-postgres:5432/${POSTGRES_DB:-postgres}
      FACTORY_AUTH_JWKS_URL: http://infra-auth:3000/api/v1/auth/.well-known/jwks.json
      DX_GATEWAY_DOMAIN: ${DX_GATEWAY_DOMAIN:-lepton.software}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      WORKFLOW_TARGET_WORLD: "@workflow/world-postgres"
      WORKFLOW_POSTGRES_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@infra-postgres:5432/${POSTGRES_DB:-postgres}
      WORKFLOW_POSTGRES_JOB_PREFIX: "factory_"
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://infra-otel-collector:4318
      NATS_URL: nats://infra-nats:4222
      LOKI_URL: ${LOKI_URL:-http://infra-loki:3100}
    healthcheck:
      test: [
          "CMD-SHELL",
          'node -e
          "fetch(''http://localhost:4100/api/v1/factory/openapi'').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      dx.description: "Factory API — product, build, fleet, agent management"
      dx.owner: platform
      dx.tags: "api,rest,elysia"
      dx.lifecycle: production
      dx.port.4100.name: http
      dx.port.4100.protocol: http
      dx.port.4100.exposure: public
      dx.port.9090.name: gateway-proxy
      dx.port.9090.protocol: http
      dx.api.provides: "factory-api"
      dx.api.type: openapi
      dx.api.consumes: "auth-api"
      dx.docs.api: "/api/v1/factory/openapi"
      dx.docs.url: "https://docs.internal/factory"
      dx.source.repo: nksaraf/factory
      dx.source.path: api
      dx.dev.command: "pnpm --filter @smp/factory-api-server dev"
      dx.dev.sync: "./api/src,./shared/src"
      dx.runtime: node
      dx.previous-slugs: "infra-factory"
      dx.dep.infra-postgres.env.FACTORY_DATABASE_URL: "postgres://postgres:postgres@{host}:{port}/postgres"
      dx.dep.infra-postgres.env.WORKFLOW_POSTGRES_URL: "postgres://postgres:postgres@{host}:{port}/postgres"
      dx.dep.infra-auth.env.FACTORY_AUTH_JWKS_URL: "http://{host}:{port}/api/v1/auth/.well-known/jwks.json"
      dx.dep.infra-auth.env.BETTER_AUTH_BASE_URL: "http://{host}:{port}"
      dx.dep.infra-nats.env.NATS_URL: "nats://{host}:{port}"

  factory-ui:
    image: node:22-slim
    ports:
      - "${UI_PORT:-3001}:3001"
    labels:
      dx.description: "Factory UI — unified platform dashboard"
      dx.owner: platform
      dx.tags: "ui,react,vinxi,dashboard"
      dx.type: website
      dx.lifecycle: development
      dx.port.3001.name: http
      dx.port.3001.protocol: http
      dx.port.3001.exposure: public
      dx.source.repo: nksaraf/factory
      dx.source.path: ui
      dx.dev.command: "pnpm --filter @rio.js/factory.ui dev"
      dx.dev.sync: "./ui/src,./shared/src"
      dx.dev.mode: native
      dx.runtime: node
      dx.dep.infra-factory: "api"
      dx.dep.infra-factory.env.PUBLIC_FACTORY_API_URL: "http://{host}:{port}/api/v1/factory"
      dx.dep.infra-auth: "auth"
      dx.dep.infra-auth.env.PUBLIC_AUTH_URL: "http://{host}:{port}"

  # ─── Resources (infrastructure) ──────────────────────────────

  infra-postgres:
    image: postgres:16-alpine
    ports:
      - "${INFRA_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      dx.description: "Shared PostgreSQL database"
      dx.owner: platform
      dx.type: database
      dx.port.5432.name: postgres
      dx.port.5432.protocol: tcp

  init-postgres-bootstrap:
    image: postgres:16-alpine
    depends_on:
      infra-postgres:
        condition: service_healthy
    volumes:
      - ./infra/postgres/init-always.sql:/init-always.sql:ro
    entrypoint:
      [
        "psql",
        "-h",
        "infra-postgres",
        "-U",
        "postgres",
        "-d",
        "postgres",
        "-f",
        "/init-always.sql",
      ]
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    restart: "no"
    labels:
      dx.description: "One-shot init: creates databases and users for dependent services"
      dx.owner: platform
      dx.type: init
      dx.previous-slugs: "infra-postgres-init"

  infra-spicedb:
    image: authzed/spicedb:latest
    command: serve
    restart: unless-stopped
    ports:
      - "${INFRA_SPICEDB_PORT:-50051}:50051"
    depends_on:
      init-postgres-bootstrap:
        condition: service_completed_successfully
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: ${SPICEDB_PRESHARED_KEY:-dev-key}
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@infra-postgres:5432/spicedb?sslmode=disable
    healthcheck:
      test: ["NONE"]
    labels:
      dx.kind: Resource
      dx.description: "SpiceDB — Zanzibar-style authorization (ReBAC)"
      dx.owner: platform
      dx.type: auth-provider
      dx.tags: "authz,spicedb,rebac"
      dx.port.50051.name: grpc
      dx.port.50051.protocol: grpc

  infra-auth:
    image: "${DOCKER_REGISTRY_GCP:-asia-south2-docker.pkg.dev}/rio-platform/docker/auth-service:latest"
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "${INFRA_AUTH_PORT:-8180}:3000"
    depends_on:
      infra-postgres:
        condition: service_healthy
    volumes:
      - ./infra/auth/auth.settings.yaml:/app/config/application.yml:ro
    environment:
      AUTH_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@infra-postgres:5432/${POSTGRES_DB:-postgres}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:${INFRA_AUTH_PORT:-8180}}
      AUTH_SPICEDB_ENABLED: "false"
      AUTH_SPICEDB_ENDPOINT: infra-spicedb:50051
      AUTH_SPICEDB_TOKEN: ${SPICEDB_PRESHARED_KEY:-dev-key}
      AUTH_SPICEDB_INSECURE: "true"
    healthcheck:
      test: [
          "CMD-SHELL",
          'node -e
          "fetch(''http://localhost:3000/api/v1/auth/reference'').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      dx.kind: Resource
      dx.description: "Better Auth — authentication, OAuth, organizations, API keys"
      dx.owner: platform
      dx.type: auth-provider
      dx.tags: "auth,oauth,jwt"
      dx.port.3000.name: http
      dx.port.3000.protocol: http
      dx.api.provides: "auth-api"
      dx.docs.url: "https://www.better-auth.com/docs"
      dx.docs.api: "/api/v1/auth/reference"
      dx.source.repo: LeptonSoftware/control-plane
      dx.source.path: services/auth-service
      dx.source.required: "true"
    build:
      context: ./packages/npm/auth-service
      dockerfile: ./Dockerfile
      args:
        GOOGLE_APPLICATION_CREDENTIALS_BASE64: ${GCP_NPM_SA_JSON_BASE64}

  infra-gateway:
    image: apache/apisix:3.11.0-debian
    ports:
      - "${INFRA_GATEWAY_PORT:-9000}:9000"
    environment:
      CLICKSTACK_API_KEY: ${CLICKSTACK_API_KEY}
    volumes:
      - ./infra/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./infra/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "apisix test 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      dx.description: "APISIX API Gateway — auth, CORS, OTEL, routing"
      dx.owner: platform
      dx.type: gateway
      dx.tags: "gateway,apisix,routing"
      dx.port.9000.name: http
      dx.port.9000.protocol: http

  infra-reverse-proxy:
    image: ${TRAEFIK_IMAGE:-traefik:v3.6.8}
    restart: unless-stopped
    command:
      - --providers.file.filename=/etc/traefik/dynamic/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --api.dashboard=${TRAEFIK_DASHBOARD_ENABLED:-false}
      - --api.insecure=false
      - --ping=true
      - --ping.entrypoint=web
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
      - --accesslog=${TRAEFIK_ACCESSLOG_ENABLED:-true}
      - --tracing=true
      - --tracing.otlp=true
      - --tracing.otlp.http=true
      - --tracing.otlp.http.endpoint=http://infra-otel-collector:4318/v1/traces
      - --tracing.serviceName=infra-reverse-proxy
    ports:
      - "${INFRA_REVERSE_PROXY_PORT:-3001}:80"
    volumes:
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
    labels:
      dx.description: "Traefik reverse proxy — routes frontend to API gateway"
      dx.owner: platform
      dx.type: gateway
      dx.tags: "traefik,proxy,routing"
      dx.port.80.name: http
      dx.port.80.protocol: http

  infra-api-docs:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/api-docs.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped
    depends_on:
      infra-gateway:
        condition: service_started
      infra-reverse-proxy:
        condition: service_started
    labels:
      dx.kind: Resource
      dx.description: "API documentation — Scalar UI served via nginx"
      dx.owner: platform
      dx.type: other
      dx.tags: "docs,nginx,scalar"

  # ---------------------------------------------------------------------------
  # PowerSync — Postgres-to-client realtime sync engine
  # ---------------------------------------------------------------------------
  infra-powersync-mongo:
    image: mongo:7-jammy
    volumes:
      - powersync-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      dx.description: "MongoDB — PowerSync storage backend"
      dx.owner: platform
      dx.type: database
      dx.tags: "mongodb,powersync"

  infra-powersync:
    image: journeyapps/powersync-service:latest
    ports:
      - "${INFRA_POWERSYNC_PORT:-8090}:8080"
    depends_on:
      init-postgres-bootstrap:
        condition: service_completed_successfully
      infra-powersync-mongo:
        condition: service_healthy
    volumes:
      - ./infra/powersync/powersync.yaml:/config/powersync.yaml:ro
    environment:
      POWERSYNC_CONFIG_PATH: /config/powersync.yaml
      POWERSYNC_JWKS_URL: ${POWERSYNC_JWKS_URL:-http://infra-auth:3000/api/v1/auth/.well-known/jwks.json}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      dx.description: "PowerSync — Postgres-to-client realtime sync engine"
      dx.owner: platform
      dx.type: sync
      dx.tags: "powersync,realtime,sync"
      dx.port.8080.name: http
      dx.port.8080.protocol: http
      dx.docs.url: "https://docs.powersync.com"

  # ---------------------------------------------------------------------------
  # NATS — real-time event broker with JetStream persistence
  # ---------------------------------------------------------------------------
  infra-nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    labels:
      dx.system: factory-dx
      dx.component: infra-nats
      dx.type: message-queue
      dx.description: "NATS JetStream — real-time event broker"
      dx.port.4222.name: nats
      dx.port.4222.protocol: tcp

  # ---------------------------------------------------------------------------
  # Redis — used for presence WebSocket fan-out across API instances
  # ---------------------------------------------------------------------------
  infra-redis:
    image: redis:7-alpine
    ports:
      - "${INFRA_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      dx.description: "Redis — presence WebSocket fan-out and caching"
      dx.owner: platform
      dx.type: cache
      dx.tags: "redis,cache,pubsub"
      dx.port.6379.name: redis
      dx.port.6379.protocol: tcp

  # ---------------------------------------------------------------------------
  # Loki — log aggregation backend
  # ---------------------------------------------------------------------------
  infra-loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "${INFRA_LOKI_PORT:-3100}:3100"
    volumes:
      - loki-data:/loki
      - ./infra/loki/config.yaml:/etc/loki/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      dx.role: infra
      dx.description: "Loki — log aggregation backend"
      dx.owner: platform
      dx.type: observability
      dx.tags: "loki,logs,observability"
      dx.port.3100.name: http
      dx.port.3100.protocol: http
      dx.docs.url: "https://grafana.com/docs/loki/latest/"

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — exports logs to Loki, traces/metrics to debug
  # ---------------------------------------------------------------------------
  infra-otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    user: "0:0"
    depends_on:
      infra-loki:
        condition: service_healthy
    ports:
      - "${INFRA_OTEL_COLLECTOR_PORT:-4318}:4318"
      - "4317:4317"
      - "55679:55679"
    volumes:
      - ./infra/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    restart: unless-stopped
    # otel-contrib is a distroless image — no wget/curl available
    # Use NONE to disable built-in healthcheck; zpages at :55679 can be probed externally
    healthcheck:
      test: ["NONE"]
    labels:
      dx.description: "OpenTelemetry Collector — traces, metrics, and log export"
      dx.owner: platform
      dx.type: observability
      dx.tags: "otel,tracing,observability"
      dx.port.4318.name: otlp-http
      dx.port.4318.protocol: http
      dx.port.4317.name: otlp-grpc
      dx.port.4317.protocol: grpc
      dx.docs.url: "https://opentelemetry.io/docs/collector/"

  infra-metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    ports:
      - "${INFRA_METABASE_PORT:-3000}:3000"
    depends_on:
      init-postgres-bootstrap:
        condition: service_completed_successfully
    environment:
      # Metabase app DB — isolated database for dashboards/config
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-postgres}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-postgres}
      MB_DB_HOST: infra-postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      dx.description: "Metabase — analytics dashboards and SQL exploration"
      dx.owner: platform
      dx.type: dashboard
      dx.tags: "analytics,dashboards,bi"
      dx.port.3000.name: http
      dx.port.3000.protocol: http
      dx.docs.url: "https://www.metabase.com/docs/latest/"
      # Connection env templates for hybrid dev (non-URL pattern)
      dx.dep.infra-postgres.env.MB_DB_HOST: "{host}"
      dx.dep.infra-postgres.env.MB_DB_PORT: "{port}"
      dx.dep.infra-postgres.env.MB_DB_USER: "{POSTGRES_USER}"
      dx.dep.infra-postgres.env.MB_DB_PASS: "{POSTGRES_PASSWORD}"

volumes:
  postgres-data:
  powersync-mongo-data:
  nats-data:
  redis-data:
  loki-data:
  factory-documents:
