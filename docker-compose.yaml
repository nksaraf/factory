# docker-compose.catalog.yaml
#
# Catalog-enriched version of docker-compose.yaml.
# Uses catalog.* labels to declare APIs, ownership, documentation,
# named ports, and component types for the Software Catalog.
#
# This is the canonical project definition — docker-compose is the single
# source of truth, parsed into a CatalogSystem for the Software Catalog.

x-catalog:
  name: factory-dx
  owner: platform
  description: "Factory DX — developer experience platform and CLI toolchain"
  lifecycle: production
  repo: https://github.com/nksaraf/factory
  tags: "dx,cli,platform,backstage"

services:
  # ─── Components (things we build) ────────────────────────────

  infra-factory:
    image: asia-south2-docker.pkg.dev/rio-platform/docker/factory-service:latest
    platform: linux/amd64
    build:
      context: ./
      dockerfile: ./api-server/Dockerfile
      args:
        GOOGLE_APPLICATION_CREDENTIALS_BASE64: ${GCP_NPM_SA_JSON_BASE64}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    ports:
      - "${INFRA_FACTORY_PORT:-4100}:4100"
      - "${INFRA_GATEWAY_PROXY_PORT:-9090}:9090"
    depends_on:
      infra-postgres:
        condition: service_healthy
      infra-auth:
        condition: service_healthy
    volumes:
      - ./infra/factory/application.yml:/app/config/application.yml:ro
      - factory-documents:/data/documents
    environment:
      PORT: 4100
      FACTORY_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@infra-postgres:5432/${POSTGRES_DB:-postgres}
      FACTORY_AUTH_JWKS_URL: http://infra-auth:3000/api/auth/.well-known/jwks.json
      DX_GATEWAY_DOMAIN: ${DX_GATEWAY_DOMAIN:-dx.dev}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://infra-otel-collector:4318
      LOKI_URL: ${LOKI_URL:-http://infra-loki:3100}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:4100/api/factory/openapi'').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      catalog.description: "Factory API — product, build, fleet, agent management"
      catalog.owner: platform
      catalog.tags: "api,rest,elysia"
      catalog.lifecycle: production
      catalog.port.4100.name: http
      catalog.port.4100.protocol: http
      catalog.port.9090.name: gateway-proxy
      catalog.port.9090.protocol: http
      catalog.api.provides: "factory-api"
      catalog.api.type: openapi
      catalog.api.consumes: "auth-api"
      catalog.docs.api: "/api/factory/openapi"
      catalog.docs.url: "https://docs.internal/factory"
      dx.dev.command: "pnpm --filter @smp/factory-api dev"
      dx.dev.sync: "./api/src,./shared/src"
      dx.runtime: node

  # ─── Resources (infrastructure) ──────────────────────────────

  infra-postgres:
    image: postgres:16-alpine
    ports:
      - "${INFRA_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      catalog.description: "Shared PostgreSQL database"
      catalog.owner: platform
      catalog.type: database
      catalog.port.5432.name: postgres
      catalog.port.5432.protocol: tcp

  infra-spicedb:
    image: authzed/spicedb:latest
    command: serve
    restart: unless-stopped
    ports:
      - "${INFRA_SPICEDB_PORT:-50051}:50051"
    depends_on:
      infra-postgres:
        condition: service_healthy
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: ${SPICEDB_PRESHARED_KEY:-dev-key}
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@infra-postgres:5432/spicedb?sslmode=disable
    healthcheck:
      test: ["CMD-SHELL", "grpc_health_probe -addr=:50051 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      catalog.kind: Resource
      catalog.description: "SpiceDB — Zanzibar-style authorization (ReBAC)"
      catalog.owner: platform
      catalog.type: auth-provider
      catalog.tags: "authz,spicedb,rebac"
      catalog.port.50051.name: grpc
      catalog.port.50051.protocol: grpc

  infra-auth:
    image: asia-south2-docker.pkg.dev/rio-platform/docker/auth-service:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "${INFRA_AUTH_PORT:-8180}:3000"
    depends_on:
      infra-postgres:
        condition: service_healthy
    volumes:
      - ./infra/auth/auth.settings.yaml:/app/config/application.yml:ro
    environment:
      AUTH_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@infra-postgres:5432/${POSTGRES_DB:-postgres}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:${INFRA_AUTH_PORT:-8180}}
      AUTH_SPICEDB_ENABLED: "false"
      AUTH_SPICEDB_ENDPOINT: infra-spicedb:50051
      AUTH_SPICEDB_TOKEN: ${SPICEDB_PRESHARED_KEY:-dev-key}
      AUTH_SPICEDB_INSECURE: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/api/auth/reference'').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      catalog.kind: Resource
      catalog.description: "Better Auth — authentication, OAuth, organizations, API keys"
      catalog.owner: platform
      catalog.type: auth-provider
      catalog.tags: "auth,oauth,jwt"
      catalog.port.3000.name: http
      catalog.port.3000.protocol: http
      catalog.api.provides: "auth-api"
      catalog.docs.url: "https://www.better-auth.com/docs"
      catalog.docs.api: "/api/auth/reference"

  infra-gateway:
    image: apache/apisix:3.11.0-debian
    ports:
      - "${INFRA_GATEWAY_PORT:-9000}:9000"
    environment:
      CLICKSTACK_API_KEY: ${CLICKSTACK_API_KEY}
    volumes:
      - ./infra/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./infra/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      catalog.description: "APISIX API Gateway — auth, CORS, OTEL, routing"
      catalog.owner: platform
      catalog.type: gateway
      catalog.tags: "gateway,apisix,routing"
      catalog.port.9000.name: http
      catalog.port.9000.protocol: http

  infra-reverse-proxy:
    image: ${TRAEFIK_IMAGE:-traefik:v3.6.8}
    restart: unless-stopped
    command:
      - --providers.file.filename=/etc/traefik/dynamic/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --api.dashboard=${TRAEFIK_DASHBOARD_ENABLED:-false}
      - --api.insecure=false
      - --ping=true
      - --ping.entrypoint=web
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
      - --accesslog=${TRAEFIK_ACCESSLOG_ENABLED:-true}
      - --tracing=true
      - --tracing.otlp=true
      - --tracing.otlp.http=true
      - --tracing.otlp.http.endpoint=http://infra-otel-collector:4318/v1/traces
      - --tracing.serviceName=infra-reverse-proxy
    ports:
      - "${INFRA_REVERSE_PROXY_PORT:-3001}:80"
    volumes:
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
    labels:
      catalog.description: "Traefik reverse proxy — routes frontend to API gateway"
      catalog.owner: platform
      catalog.type: gateway
      catalog.tags: "traefik,proxy,routing"
      catalog.port.80.name: http
      catalog.port.80.protocol: http

  infra-api-docs:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/api-docs.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped
    depends_on:
      infra-gateway:
        condition: service_started
      infra-reverse-proxy:
        condition: service_started
    labels:
      catalog.kind: Resource
      catalog.description: "API documentation — Scalar UI served via nginx"
      catalog.owner: platform
      catalog.type: other
      catalog.tags: "docs,nginx,scalar"

  # ---------------------------------------------------------------------------
  # PowerSync — Postgres-to-client realtime sync engine
  # ---------------------------------------------------------------------------
  infra-powersync-mongo:
    image: mongo:7-jammy
    volumes:
      - powersync-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      catalog.description: "MongoDB — PowerSync storage backend"
      catalog.owner: platform
      catalog.type: database
      catalog.tags: "mongodb,powersync"

  infra-powersync:
    image: journeyapps/powersync-service:latest
    ports:
      - "${INFRA_POWERSYNC_PORT:-8090}:8080"
    depends_on:
      infra-postgres:
        condition: service_healthy
      infra-powersync-mongo:
        condition: service_healthy
    volumes:
      - ./infra/powersync/powersync.yaml:/config/powersync.yaml:ro
    environment:
      POWERSYNC_CONFIG_PATH: /config/powersync.yaml
      POWERSYNC_JWKS_URL: ${POWERSYNC_JWKS_URL:-http://infra-auth:3000/api/auth/.well-known/jwks.json}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      catalog.description: "PowerSync — Postgres-to-client realtime sync engine"
      catalog.owner: platform
      catalog.type: sync
      catalog.tags: "powersync,realtime,sync"
      catalog.port.8080.name: http
      catalog.port.8080.protocol: http
      catalog.docs.url: "https://docs.powersync.com"

  # ---------------------------------------------------------------------------
  # NATS — real-time event broker with JetStream persistence
  # ---------------------------------------------------------------------------
  infra-nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    labels:
      catalog.system: factory-dx
      catalog.component: infra-nats
      catalog.type: message-queue
      catalog.description: "NATS JetStream — real-time event broker"

  # ---------------------------------------------------------------------------
  # Redis — used for presence WebSocket fan-out across API instances
  # ---------------------------------------------------------------------------
  infra-redis:
    image: redis:7-alpine
    ports:
      - "${INFRA_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      catalog.description: "Redis — presence WebSocket fan-out and caching"
      catalog.owner: platform
      catalog.type: cache
      catalog.tags: "redis,cache,pubsub"
      catalog.port.6379.name: redis
      catalog.port.6379.protocol: tcp

  # ---------------------------------------------------------------------------
  # Loki — log aggregation backend
  # ---------------------------------------------------------------------------
  infra-loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "${INFRA_LOKI_PORT:-3100}:3100"
    volumes:
      - loki-data:/loki
      - ./infra/loki/config.yaml:/etc/loki/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      dx.role: infra
      catalog.description: "Loki — log aggregation backend"
      catalog.owner: platform
      catalog.type: observability
      catalog.tags: "loki,logs,observability"
      catalog.port.3100.name: http
      catalog.port.3100.protocol: http
      catalog.docs.url: "https://grafana.com/docs/loki/latest/"

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — exports logs to Loki, traces/metrics to debug
  # ---------------------------------------------------------------------------
  infra-otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    user: "0:0"
    depends_on:
      infra-loki:
        condition: service_healthy
    ports:
      - "${INFRA_OTEL_COLLECTOR_PORT:-4318}:4318"
      - "4317:4317"
      - "55679:55679"
    volumes:
      - ./infra/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    restart: unless-stopped
    # otel-contrib is a distroless image — no wget/curl available
    # Use NONE to disable built-in healthcheck; zpages at :55679 can be probed externally
    healthcheck:
      test: ["NONE"]
    labels:
      catalog.description: "OpenTelemetry Collector — traces, metrics, and log export"
      catalog.owner: platform
      catalog.type: observability
      catalog.tags: "otel,tracing,observability"
      catalog.port.4318.name: otlp-http
      catalog.port.4318.protocol: http
      catalog.port.4317.name: otlp-grpc
      catalog.port.4317.protocol: grpc
      catalog.docs.url: "https://opentelemetry.io/docs/collector/"

  infra-metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    ports:
      - "${INFRA_METABASE_PORT:-3000}:3000"
    depends_on:
      infra-postgres:
        condition: service_healthy
    environment:
      # Metabase app DB — isolated database for dashboards/config
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-postgres}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-postgres}
      MB_DB_HOST: infra-postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      catalog.description: "Metabase — analytics dashboards and SQL exploration"
      catalog.owner: platform
      catalog.type: dashboard
      catalog.tags: "analytics,dashboards,bi"
      catalog.port.3000.name: http
      catalog.port.3000.protocol: http
      catalog.docs.url: "https://www.metabase.com/docs/latest/"
      # Connection env templates for hybrid dev (non-URL pattern)
      dx.dep.infra-postgres.env.MB_DB_HOST: "{host}"
      dx.dep.infra-postgres.env.MB_DB_PORT: "{port}"
      dx.dep.infra-postgres.env.MB_DB_USER: "{POSTGRES_USER}"
      dx.dep.infra-postgres.env.MB_DB_PASS: "{POSTGRES_PASSWORD}"

volumes:
  postgres-data:
  powersync-mongo-data:
  nats-data:
  redis-data:
  loki-data:
  factory-documents:
