apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: factory
data:
  config.yaml: |
    apisix:
      node_listen: 8005
      enable_ipv6: false
      enable_admin: false

    deployment:
      role: data_plane
      role_data_plane:
        config_provider: yaml

    plugins:
      - proxy-rewrite
      - cors
      - real-ip
      - response-rewrite
      - redirect

  apisix.yaml: |
    upstreams:
    - id: auth-service
      nodes:
        auth:3000: 1
    - id: factory-service
      nodes:
        factory-api:3000: 1

    global_rules:
    - id: 1
      plugins:
        real-ip:
          source: http_x_forwarded_for

    routes:
    - id: auth
      uri: /api/v1/auth*
      upstream_id: auth-service
      plugins:
        proxy-rewrite:
          headers:
            set:
              X-Real-IP: $remote_addr
              X-Forwarded-For: $remote_addr
              X-Forwarded-Proto: $scheme

    - id: factory
      uri: /api/v1/factory*
      upstream_id: factory-service
      plugins:
        cors:
          allow_origins: '**'
          allow_methods: GET, POST, PUT, PATCH, DELETE, OPTIONS
          allow_headers: Authorization, Content-Type, X-Requested-With, X-CSRF-Token,
            Accept, Origin, Referer, User-Agent, Access-Control-Request-Method, Access-Control-Request-Headers
          expose_headers: Content-Length, Content-Type, X-Requested-With
          allow_credential: true
          max_age: 3600
        proxy-rewrite:
          regex_uri:
          - ^/api/v1/factory(.*)
          - /api/v1/factory$1
          headers:
            set:
              X-Real-IP: $remote_addr
              X-Forwarded-For: $remote_addr

    - id: health
      uri: /health
      plugins:
        response-rewrite:
          status_code: 200
          body: '{"status":"healthy"}'
          headers:
            set:
              Content-Type: application/json

    #END
