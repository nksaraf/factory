apiVersion: v1
kind: Secret
metadata:
  name: factory-secrets
  namespace: factory
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: postgres
  DATABASE_URL: "postgres://postgres:postgres@postgres:5432/postgres"

  # Auth
  AUTH_DATABASE_URL: "postgres://postgres:postgres@postgres:5432/postgres"
  BETTER_AUTH_SECRET: "change-me-with-a-strong-random-secret"

  # OAuth (populate with real values)
  GITHUB_OAUTH_CLIENT_ID: ""
  GITHUB_OAUTH_CLIENT_SECRET: ""
  GOOGLE_OAUTH_CLIENT_ID: ""
  GOOGLE_OAUTH_CLIENT_SECRET: ""

  # GCP Artifact Registry (for image pulls during build)
  GCP_NPM_SA_JSON_BASE64: ""
