apiVersion: v1
kind: Service
metadata:
  name: factory-api
  namespace: factory
  labels:
    app: factory-api
spec:
  selector:
    app: factory-api
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-api
  namespace: factory
  labels:
    app: factory-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: factory-api
  template:
    metadata:
      labels:
        app: factory-api
    spec:
      containers:
        - name: factory-api
          image: asia-south2-docker.pkg.dev/rio-platform/docker/factory-service:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: DATABASE_URL
            - name: FACTORY_AUTH_JWKS_URL
              value: "http://auth:3000/api/v1/auth/.well-known/jwks.json"
          volumeMounts:
            - name: factory-config
              mountPath: /app/config/application.yml
              subPath: application.yml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/v1/factory/openapi
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/factory/openapi
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: factory-config
          configMap:
            name: factory-config
