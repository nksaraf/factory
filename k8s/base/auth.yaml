apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: factory
  labels:
    app: auth
spec:
  selector:
    app: auth
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: factory
  labels:
    app: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: asia-south2-docker.pkg.dev/rio-platform/docker/auth-service:latest
          ports:
            - containerPort: 3000
          env:
            - name: AUTH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: AUTH_DATABASE_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: BETTER_AUTH_SECRET
            - name: AUTH_BASE_URL
              value: "http://factory.example.com"
            - name: GITHUB_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: GITHUB_OAUTH_CLIENT_ID
            - name: GITHUB_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: GITHUB_OAUTH_CLIENT_SECRET
            - name: GOOGLE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: GOOGLE_OAUTH_CLIENT_ID
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: GOOGLE_OAUTH_CLIENT_SECRET
          volumeMounts:
            - name: auth-config
              mountPath: /app/config/application.yml
              subPath: application.yml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/v1/auth/reference
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/auth/reference
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: auth-config
          configMap:
            name: auth-config
