services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    ports:
      - "3000:3000"
      - "9090:9090"
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379
      AUTH_URL: http://auth:8080/api/v1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    labels:
      dx.description: "Main API service"
      dx.owner: backend
      dx.tags: "api,rest"
      dx.api.provides: "orders-api,webhooks-api"
      dx.api.consumes: "auth-api"
      dx.docs.api: "/api/docs"
      dx.docs.runbook: "https://wiki.internal/runbooks/api"
      dx.port.3000.name: http
      dx.port.3000.protocol: http
      dx.port.9090.name: metrics
      dx.port.9090.protocol: http

  worker:
    build:
      context: ./worker
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/app
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    labels:
      dx.type: worker
      dx.description: "Background job processor"

  auth:
    image: myorg/auth-service:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://auth:auth@postgres:5432/auth
    labels:
      dx.api.provides: "auth-api"
      dx.docs.url: "https://docs.internal/auth"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    labels:
      dx.port.5672.name: amqp
      dx.port.5672.protocol: tcp
      dx.port.15672.name: management-ui
      dx.port.15672.protocol: http

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
