module: billing
team: payments
components:
  api:
    path: ./api
    port: 8080
    healthcheck: /health
resources:
  postgres:
    image: postgres:16-alpine
    port: 5432
    env:
      POSTGRES_DB: billing
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: secret
    healthcheck: "pg_isready -U billing"
    volumes:
      - pg-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    port: 6379
connections:
  auth:
    module: auth
    component: api
    env_var: AUTH_URL
    local_default: http://localhost:8180
