name: Build and Push Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: asia-south2-docker.pkg.dev
  PROJECT_ID: rio-platform
  REPOSITORY: docker
  IMAGE_NAME: smart-market-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud as a credential helper
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Extract version from package.json
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Generate image tags
        id: meta
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)

          # Construct full image name
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}"

          # Initialize tags
          TAGS=""

          # Add latest tag only for main branch
          if [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAGS="$IMAGE:latest"
          fi

          # Add branch name tag for branch pushes
          if [[ "${{ github.ref }}" == refs/heads/* ]]; then
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            # Sanitize branch name (replace / with -)
            BRANCH_NAME=$(echo "$BRANCH_NAME" | tr '/' '-')
            if [[ -z "$TAGS" ]]; then
              TAGS="$IMAGE:$BRANCH_NAME"
            else
              TAGS="$TAGS,$IMAGE:$BRANCH_NAME"
            fi
          fi

          # Add version tags
          if [[ -z "$TAGS" ]]; then
            TAGS="$IMAGE:$VERSION"
          else
            TAGS="$TAGS,$IMAGE:$VERSION"
          fi
          TAGS="$TAGS,$IMAGE:$SHORT_SHA"
          TAGS="$TAGS,$IMAGE:$FULL_SHA"

          # Add git tag if this is a tag event
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            GIT_TAG=${GITHUB_REF#refs/tags/}
            TAGS="$TAGS,$IMAGE:$GIT_TAG"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Generated tags: $TAGS"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Docker Image Built and Pushed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.meta.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
