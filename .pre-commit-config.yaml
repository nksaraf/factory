# Pre-commit hooks for smart-market-platform
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files
# Run on commit: automatic after `pre-commit install`

repos:
  # -- General --
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key

  # -- Secret Detection --
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # -- Python (Ruff) --
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        name: "python-lint: Run `ruff check --fix` to auto-fix"
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python]
      - id: ruff-format
        name: "python-format: Run `ruff format .` to fix"
        types_or: [python]

  # -- Frontend (Prettier) --
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: "frontend-format: Run `pnpm format` to fix"
        types_or: [javascript, jsx, ts, tsx, css, json, markdown]
        additional_dependencies:
          - prettier@3
          - "@trivago/prettier-plugin-sort-imports@4"
        files: ^apps/
        exclude: node_modules|\.next|dist|build|\.d\.ts$

  # -- Commit Message --
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        name: "commit-msg: Use format `type(scope): description`"
        stages: [commit-msg]
        args:
          - feat
          - fix
          - chore
          - docs
          - refactor
          - test
          - style
          - perf
          - ci
          - build
