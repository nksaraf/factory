version: "1"

# Network links — NAT mappings and IP-to-host assignments
#
# NAT links:
#   source = public ip-address being NATted
#   via    = host doing the NAT (gajshield-fw)
#   target = private host (if registered) or private ip-address
#
# host-local links:
#   source = private ip-address
#   target = host it is assigned to
#   Enables tracer to continue: public IP → (nat) → private IP → (host-local) → host
entities:

