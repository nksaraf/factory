version: "1"

# Hosts — physical machines not discovered by Proxmox sync
entities:
  # ── Firewall ─────────────────────────────────────────────────
  - kind: host
    slug: gajshield-fw
    name: Gajshield Firewall
    type: network-appliance
    estateSlug: lepton-datacenter
    spec:
      hostname: gajshield
      os: linux
      arch: amd64
      ipAddress: "192.168.1.5"
      lifecycle: active
      accessMethod: ssh
      accessUser: root
      sshPort: 22
      model: Gajshield
      managementUrl: "https://192.168.1.5"

